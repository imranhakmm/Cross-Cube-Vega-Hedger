<svg class="architecture-svg" viewBox="0 0 1120 190" role="img" aria-labelledby="arch-title arch-desc" xmlns="http://www.w3.org/2000/svg">
  <title id="arch-title">Cross-Cube Vega pipeline architecture</title>
  <desc id="arch-desc">Five modules connected left to right from cube simulator through P and L attribution.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#7a2e2e"/>
    </marker>
  </defs>
  <rect x="20" y="50" width="180" height="78" rx="6" fill="#b8b8b8" fill-opacity="0.30" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="250" y="50" width="180" height="78" rx="6" fill="#b8b8b8" fill-opacity="0.30" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="480" y="50" width="190" height="78" rx="6" fill="#b8b8b8" fill-opacity="0.30" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="720" y="50" width="180" height="78" rx="6" fill="#b8b8b8" fill-opacity="0.30" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="950" y="50" width="150" height="78" rx="6" fill="#b8b8b8" fill-opacity="0.30" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="110" y="84" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="23" fill="#1a1a1a">Cube</text>
  <text x="110" y="110" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="23" fill="#1a1a1a">simulator</text>
  <text x="340" y="84" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="23" fill="#1a1a1a">SABR</text>
  <text x="340" y="110" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="23" fill="#1a1a1a">calibration</text>
  <text x="575" y="84" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="23" fill="#1a1a1a">PCA + factor</text>
  <text x="575" y="110" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="23" fill="#1a1a1a">analytics</text>
  <text x="810" y="84" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="23" fill="#1a1a1a">Market-maker</text>
  <text x="810" y="110" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="23" fill="#1a1a1a">loop</text>
  <text x="1025" y="84" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="23" fill="#1a1a1a">P&amp;L</text>
  <text x="1025" y="110" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="23" fill="#1a1a1a">attribution</text>
  <path d="M205 89 H240" fill="none" stroke="#7a2e2e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M435 89 H470" fill="none" stroke="#7a2e2e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M675 89 H710" fill="none" stroke="#7a2e2e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M905 89 H940" fill="none" stroke="#7a2e2e" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>
