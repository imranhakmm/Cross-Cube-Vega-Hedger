:root {

body {

main {

nav, footer {

}
.lede {
  font-size: 20px;
  line-height: 1.45;
  color: var(--graphite);
}
.note {
  float: right;
  width: 220px;
  margin: 0 0 24px 28px;
  font-size: 14px;
  line-height: 1.45;
  color: var(--graphite);
  border-left: 3px solid var(--silver);
  padding-left: 14px;
}
table {
  border-collapse: collapse;
  width: 100%;
  font-family: Arial, sans-serif;
  font-size: 14px;

th, td {
  border-bottom: 1px solid #ddd;
  padding: 8px 10px;
  text-align: right;
}
th:first-child, td:first-child {
  text-align: left;
}
img {
  max-width: 100%;
  height: auto;
}
