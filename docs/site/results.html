:root {

body {

main {

nav, footer {

footer {

h2 {

}
.lede {
  max-width: 60ch;

  line-height: 1.45;
  color: var(--graphite);
}
.note {
  float: right;
  width: 220px;
  margin: 0 0 24px 28px;
  font-size: 14px;

p {
  max-width: 60ch;
}
table {
  border-collapse: collapse;
  max-width: 64rem;
  font-family: "Source Sans 3", Inter, Arial, sans-serif;
  font-size: 14px;
}
th, td {
  border-bottom: 1px solid #ddd;
  padding: 8px 10px;
  text-align: right;
}
th:first-child, td:first-child {
  text-align: left;
}
img {
  max-width: 100%;
  height: auto;
  margin: 1.2rem 0;
}
.plotly-graph-div {
  max-width: 64rem;
}
